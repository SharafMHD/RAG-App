services:
  # FastAPI application
  fastapi:
    build: 
      context: ..
      dockerfile: docker/rag-app/Dockerfile
    container_name: fastapi
    networks:
      - backend
    ports:
      - "8000:8000"
    volumes:
      - fastapi_data:/app/assets
    restart:
      always
    depends_on:
      pgvector:
        condition: service_healthy
    env_file:
      - ./env/.env.app
  # Ngnix reverse proxy
  nginx:
    image: nginx:stable
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - fastapi
    networks:
      - backend
    restart: always
  # Postgres PG vector database
  pgvector:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: pgvector
    ports:
      - "5400:5432"
    volumes:
      - 'pgvector:/var/lib/postgresql'
    env_file:
      - ./env/.env.postgres
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  #Qdrant DB
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - 'qdrant_data:/qdrant/storage'
    networks:
      - backend
    restart: always

  #Prometheus Metrics
  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - 'prometheus_data:/prometheus'
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - backend
    restart: always
    command: 
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/console_templates'
      - '--web.enable-lifecycle'

  #grafana Dashboard
  grafana:
    image: grafana/grafana:11.6.15
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - 'grafana_data:/var/lib/grafana'
    env_file:
      - ./env/.env.grafana
    depends_on:
      - prometheus
    networks:
      - backend
    restart: always

  #Node exporter for system metrics
  node_exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node_exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs '
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'
    networks:
      - backend
    restart: always
  #postgres exporter for postgres metrics
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    container_name: postgres_exporter
    ports:
      - "9187:9187"
    env_file:
      - ./env/.env.postgres-exporter
    depends_on:
      - pgvector
    networks:
      - backend
    restart: always
  # RabitMQ for message brokering
  rabbitmq:
    image: rabbitmq:4.3.2-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672" #AMQP port
      - "15672:15672" #Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq 
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    env_file:
      - ./env/.env.rabbitmq
    networks:
      - backend
    restart:
      always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      timeout: 30s
      retries: 5
      start_period: 30s

  # REDIS 
  redis:
    image: redis:8.2.7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    env_file:
      - ./env/.env.redis
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 30s
      retries: 5
      start_period: 30s
    command: ["redis-server" , "--appendonly", "yes" , "--requirepass","${REDIS_PASSWORD:-RAG_APP_PWD}"]
networks:
  backend:
    driver: bridge

volumes:
  fastapi_data:
  pgvector:
  qdrant_data:
  prometheus_data:
  grafana_data:
  rabbitmq_data:
  redis_data: